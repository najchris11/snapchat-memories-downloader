name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Automated Version Bump
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Get the last commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          # Determine version bump
          if [[ "$COMMIT_MSG" == *"MAJOR:"* ]]; then
            BUMP="major"
          elif [[ "$COMMIT_MSG" == *"MINOR:"* ]] || [[ "$COMMIT_MSG" == *"FEAT:"* ]]; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          
          echo "Bumping version ($BUMP)..."
          
          # Run python inline script to bump packageVersion in composeApp/build.gradle.kts
          NEW_VERSION=$(python3 -c "
          import re, sys
          with open('composeApp/build.gradle.kts', 'r') as f:
              content = f.read()
          version_match = re.search(r'packageVersion\s*=\s*\"([^\"]+)\"', content)
          if not version_match:
              sys.exit('packageVersion not found')
          version = version_match.group(1)
          major, minor, patch = map(int, version.split('.'))
          bump = '$BUMP'
          if bump == 'major':
              major += 1
              minor = 0
              patch = 0
          elif bump == 'minor':
              minor += 1
              patch = 0
          else:
              patch += 1
          new_version = f'{major}.{minor}.{patch}'
          content = re.sub(r'packageVersion\s*=\s*\"[^\"]+\"', f'packageVersion = \"{new_version}\"', content)
          content = re.sub(r'versionName\s*=\s*\"[^\"]+\"', f'versionName = \"{new_version}\"', content)
          code_match = re.search(r'versionCode\s*=\s*(\d+)', content)
          if code_match:
              code = int(code_match.group(1)) + 1
              content = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {code}', content)
          with open('composeApp/build.gradle.kts', 'w') as f:
              f.write(content)
          print(new_version)
          ")
          
          NEW_TAG="v$NEW_VERSION"
          echo "New Version: $NEW_VERSION"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          # Commit and Push
          git add composeApp/build.gradle.kts
          git commit -m "chore: release $NEW_TAG [skip ci]"
          git tag $NEW_TAG
          
          git push origin main
          git push origin $NEW_TAG

  build-release:
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Install Linux dependencies if running on Ubuntu
      - name: Install Linux Deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools xz-utils zip unzip

      # Make sure packaging dependencies are installed on macOS
      - name: Install macOS Deps
        if: matrix.os == 'macos-latest'
        run: |
          echo "No extra dependencies needed"

      - name: Prepare Bundled Runtime (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          bash scripts/prepare-runtime-macos.sh

      - name: Prepare Bundled Runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          bash scripts/prepare-runtime-linux.sh

      - name: Prepare Bundled Runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\scripts\prepare-runtime-windows.ps1
          
      - name: Build & Package Desktop Distribution
        run: |
          ./gradlew packageDistributionForCurrentOS

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          files: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
