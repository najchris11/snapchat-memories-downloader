name: Release

# Releases are cut manually (Actions → Release → Run workflow) so that merging a PR
# never auto-publishes installers. The workflow bumps the version, tags, runs the
# desktop test suite on all three OSes, and only then packages and uploads.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Automated Version Bump
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" == *"MAJOR:"* ]]; then
            BUMP="major"
          elif [[ "$COMMIT_MSG" == *"MINOR:"* ]] || [[ "$COMMIT_MSG" == *"FEAT:"* ]]; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "Bumping version ($BUMP)..."

          NEW_VERSION=$(python3 -c "
          import re, sys
          with open('gradle.properties', 'r') as f:
              prop_content = f.read()
          version_match = re.search(r'app\.version\s*=\s*([^\r\n]+)', prop_content)
          if not version_match:
              sys.exit('app.version not found in gradle.properties')
          version = version_match.group(1).strip()
          version_core = version.split('-')[0]
          major, minor, patch = map(int, version_core.split('.'))
          bump = '$BUMP'
          if bump == 'major':
              major += 1; minor = 0; patch = 0
          elif bump == 'minor':
              minor += 1; patch = 0
          else:
              patch += 1
          new_version = f'{major}.{minor}.{patch}'

          prop_content = re.sub(r'app\.version\s*=\s*.*', f'app.version={new_version}', prop_content)
          with open('gradle.properties', 'w') as f:
              f.write(prop_content)

          with open('androidApp/build.gradle.kts', 'r') as f:
              build_content = f.read()
          code_match = re.search(r'versionCode\s*=\s*(\d+)', build_content)
          if code_match:
              code = int(code_match.group(1)) + 1
              build_content = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {code}', build_content)
              with open('androidApp/build.gradle.kts', 'w') as f:
                  f.write(build_content)

          print(new_version)
          ")

          NEW_TAG="v$NEW_VERSION"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          git add gradle.properties androidApp/build.gradle.kts
          git commit -m "chore: release $NEW_TAG [skip ci]"
          git tag $NEW_TAG
          git push origin main
          git push origin $NEW_TAG

  build-release:
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      # JBR satisfies Compose Desktop's implicit {vendor=JetBrains} toolchain
      # requirement for packaging tasks. Zulu/Temurin do not, causing Gradle
      # to fail on all three platforms when auto-provisioning is disabled.
      # Pin exact version to avoid "resolve latest" API call; explicit token ensures
      # any remaining GitHub API lookups are authenticated (avoids runner IP rate limits).
      - name: Set up JDK 21 (JetBrains Runtime)
        uses: actions/setup-java@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          java-version: '21.0.7'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Strip local-machine JDK paths from gradle.properties.
      # Do NOT re-add org.gradle.java.home — Windows backslash paths corrupt
      # .properties files. JBR installed above is auto-detected by Gradle.
      - name: Patch gradle.properties for CI
        shell: bash
        run: |
          sed -i.bak '/^org\.gradle\.java\.home/d' gradle.properties
          sed -i.bak '/^org\.gradle\.java\.installations/d' gradle.properties
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      # macOS and Windows binaries are committed to the repo; no download needed.
      # Linux bundles only exiftool (gitignored; built fresh here). FFmpeg is not
      # bundled on Linux — the app resolves it from the system PATH at runtime.
      - name: Prepare bundled runtime (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y zip unzip
          bash scripts/prepare-runtime-linux.sh

      # A release must never ship from a commit with failing tests.
      - name: Run desktop test suite
        shell: bash
        run: ./gradlew :composeApp:desktopTest -Pcompose.javaHome="$JAVA_HOME"

      # packageRelease* is the ProGuard-processed variant — the same variant used for
      # local testing, so released artifacts match what was actually validated.
      - name: Build & package desktop distribution (release variant)
        shell: bash
        run: ./gradlew packageReleaseDistributionForCurrentOS -Pcompose.javaHome="$JAVA_HOME"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          files: |
            composeApp/build/compose/binaries/main-release/dmg/*.dmg
            composeApp/build/compose/binaries/main-release/msi/*.msi
            composeApp/build/compose/binaries/main-release/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
